<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Dashboard
    </title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,sans-serif;
            background:#F1F5F9;
        }

        /* Sidebar */

        .sidebar{
            width:250px;
            height:100vh;
            background:#1E293B;
            position:fixed;
            padding-top:20px;
        }

        .sidebar h2{
            color:white;
            text-align:center;
            margin-bottom:30px;
            font-weight:bold;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px 20px;
            transition:0.3s;
            font-size:18px;
        }

        .sidebar a:hover{
            background:#2563EB;
            padding-left:30px;
        }

        .sidebar i{
            margin-right:10px;
        }

        /* Main Content */

        .main-content{
            margin-left:250px;
            padding:40px;
        }

        .welcome-box{
            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }

        .welcome-box h1{
            color:#2563EB;
            font-weight:bold;
        }

        .card-box{
            background:white;
            padding:30px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .card-box:hover{
            transform:translateY(-10px);
        }

        .card-box i{
            font-size:50px;
            color:#2563EB;
            margin-bottom:15px;
        }

        .btn-custom{
            background:#2563EB;
            color:white;
            border-radius:10px;
            padding:10px 20px;
            font-weight:bold;
        }

        .btn-custom:hover{
            background:#1D4ED8;
            color:white;
        }

    </style>

</head>

<body>

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>
            Complaint System
        </h2>

        <a href="dashboard.html">

            <i class="fas fa-home"></i>

            Dashboard

        </a>

        <a href="complaint.html">

            <i class="fas fa-edit"></i>

            Submit Complaint

        </a>

        <a href="complaints.html">

            <i class="fas fa-list"></i>

            View Complaints

        </a>

        <a href="index.html">

            <i class="fas fa-sign-out-alt"></i>

            Logout

        </a>

    </div>

    <!-- Main Content -->

    <div class="main-content">

        <div class="welcome-box">

            <h1>
                Welcome User 👋
            </h1>

            <p>
                Manage your complaints easily and
                communicate with owners quickly.
            </p>

        </div>

        <div class="row mt-4 g-4">

            <!-- Submit Complaint -->

            <div class="col-md-6">

                <div class="card-box">

                    <i class="fas fa-edit"></i>

                    <h3>
                        Submit Complaint
                    </h3>

                    <p>
                        Register a new complaint quickly.
                    </p>

                    <a href="complaint.html"
                        class="btn btn-custom">

                        Open

                    </a>

                </div>

            </div>

            <!-- View Complaints -->

            <div class="col-md-6">

                <div class="card-box">

                    <i class="fas fa-list"></i>

                    <h3>
                        View Complaints
                    </h3>

                    <p>
                        Check complaint history and status.
                    </p>

                    <a href="complaints.html"
                        class="btn btn-custom">

                        View

                    </a>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
