<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Register
    </title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:linear-gradient(
                to right,
                #22C55E,
                #16A34A
            );

            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial,sans-serif;
        }

        .register-box{

            width:450px;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 5px 20px rgba(0,0,0,0.2);

            animation:fadeIn 1s;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(-20px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        h2{
            text-align:center;
            color:#16A34A;
            margin-bottom:25px;
            font-weight:bold;
        }

        .input-group-text{
            background:#22C55E;
            color:white;
            border:none;
        }

        .form-control{
            padding:12px;
        }

        .btn-register{

            background:#22C55E;
            color:white;
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            font-size:18px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn-register:hover{
            background:#15803D;
            transform:scale(1.03);
        }

        .login-link{
            text-align:center;
            margin-top:20px;
        }

        .login-link a{
            text-decoration:none;
            color:#2563EB;
            font-weight:bold;
        }

    </style>

</head>

<body>

    <div class="register-box">

        <h2>
            User Registration
        </h2>

        <form>

            <!-- Full Name -->

            <div class="input-group mb-3">

                <span class="input-group-text">

                    <i class="fas fa-user"></i>

                </span>

                <input type="text"
                    class="form-control"
                    placeholder="Enter Full Name">

            </div>

            <!-- Email -->

            <div class="input-group mb-3">

                <span class="input-group-text">

                    <i class="fas fa-envelope"></i>

                </span>

                <input type="email"
                    class="form-control"
                    placeholder="Enter Email">

            </div>

            <!-- Phone -->

            <div class="input-group mb-3">

                <span class="input-group-text">

                    <i class="fas fa-phone"></i>

                </span>

                <input type="text"
                    class="form-control"
                    placeholder="Enter Phone Number">

            </div>

            <!-- House Number -->

            <div class="input-group mb-3">

                <span class="input-group-text">

                    <i class="fas fa-house"></i>

                </span>

                <input type="text"
                    class="form-control"
                    placeholder="Enter House Number">

            </div>

            <!-- Password -->

            <div class="input-group mb-3">

                <span class="input-group-text">

                    <i class="fas fa-lock"></i>

                </span>

                <input type="password"
                    class="form-control"
                    placeholder="Create Password">

            </div>

            <!-- Register Button -->

            <a href="login.html"
                class="btn btn-register">

                Register

            </a>

        </form>

        <div class="login-link">

            Already have an account?

            <a href="login.html">

                Login

            </a>

        </div>

    </div>

</body>

</html>
