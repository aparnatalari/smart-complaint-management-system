<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Admin Panel
    </title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,sans-serif;
            background:#F1F5F9;
        }

        /* Sidebar */

        .sidebar{
            width:250px;
            height:100vh;
            background:#1E293B;
            position:fixed;
            padding-top:20px;
        }

        .sidebar h2{
            color:white;
            text-align:center;
            margin-bottom:30px;
            font-weight:bold;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px 20px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:#2563EB;
            padding-left:30px;
        }

        .sidebar i{
            margin-right:10px;
        }

        /* Main Content */

        .main-content{
            margin-left:250px;
            padding:40px;
        }

        .admin-box{
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }

        h2{
            color:#2563EB;
            font-weight:bold;
            margin-bottom:20px;
        }

        .search-box{
            margin-bottom:20px;
        }

        .status-select{
            border-radius:8px;
        }

        .btn-update{
            background:#22C55E;
            color:white;
            border:none;
            border-radius:8px;
            padding:8px 14px;
            font-weight:bold;
        }

        .btn-update:hover{
            background:#16A34A;
        }

    </style>

</head>

<body>

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>
            Admin Panel
        </h2>

        <a href="admin.html">

            <i class="fas fa-home"></i>

            Dashboard

        </a>

        <a href="complaints.html">

            <i class="fas fa-list"></i>

            Manage Complaints

        </a>

        <a href="index.html">

            <i class="fas fa-sign-out-alt"></i>

            Logout

        </a>

    </div>

    <!-- Main Content -->

    <div class="main-content">

        <div class="admin-box">

            <h2>
                Manage Complaints
            </h2>

            <!-- Search -->

            <input type="text"
                id="searchInput"
                class="form-control search-box"
                placeholder="Search complaints..."
                onkeyup="searchComplaint()">

            <!-- Table -->

            <table class="table table-bordered"
                id="complaintTable">

                <thead class="table-primary">

                    <tr>

                        <th>ID</th>
                        <th>User</th>
                        <th>Complaint</th>
                        <th>Status</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody>

                    <tr>

                        <td>1</td>

                        <td>
                            Aparna
                        </td>

                        <td>
                            Water Issue
                        </td>

                        <td>

                            <select class="form-select status-select">

                                <option>
                                    Pending
                                </option>

                                <option>
                                    In Progress
                                </option>

                                <option>
                                    Resolved
                                </option>

                            </select>

                        </td>

                        <td>

                            <button class="btn-update"
                                onclick="updateStatus()">

                                Update

                            </button>

                        </td>

                    </tr>

                    <tr>

                        <td>2</td>

                        <td>
                            Ravi
                        </td>

                        <td>
                            Parking Issue
                        </td>

                        <td>

                            <select class="form-select status-select">

                                <option>
                                    Pending
                                </option>

                                <option>
                                    In Progress
                                </option>

                                <option>
                                    Resolved
                                </option>

                            </select>

                        </td>

                        <td>

                            <button class="btn-update"
                                onclick="updateStatus()">

                                Update

                            </button>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

    <script>

        function updateStatus(){

            alert(
                "Complaint Status Updated Successfully!"
            );
        }

        function searchComplaint(){

            let input =
                document.getElementById(
                    "searchInput"
                ).value.toLowerCase();

            let rows =
                document.querySelectorAll(
                    "#complaintTable tbody tr"
                );

            rows.forEach(row => {

                let text =
                    row.innerText.toLowerCase();

                row.style.display =
                    text.includes(input)
                    ? ""
                    : "none";
            });
        }

    </script>

</body>

</html>
