<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Submit Complaint
    </title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,sans-serif;
            background:#F1F5F9;
        }

        /* Sidebar */

        .sidebar{
            width:250px;
            height:100vh;
            background:#1E293B;
            position:fixed;
            padding-top:20px;
        }

        .sidebar h2{
            color:white;
            text-align:center;
            margin-bottom:30px;
            font-weight:bold;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px 20px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:#2563EB;
            padding-left:30px;
        }

        .sidebar i{
            margin-right:10px;
        }

        /* Main Content */

        .main-content{
            margin-left:250px;
            padding:40px;
        }

        .form-box{
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }

        .form-box h2{
            color:#2563EB;
            margin-bottom:20px;
            font-weight:bold;
        }

        .btn-submit{
            background:#22C55E;
            color:white;
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            font-size:18px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn-submit:hover{
            background:#16A34A;
        }

    </style>

</head>

<body>

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>
            Complaint System
        </h2>

        <a href="dashboard.html">
            <i class="fas fa-home"></i>
            Dashboard
        </a>

        <a href="complaint.html">
            <i class="fas fa-edit"></i>
            Submit Complaint
        </a>

        <a href="complaints.html">
            <i class="fas fa-list"></i>
            View Complaints
        </a>

        <a href="index.html">
            <i class="fas fa-sign-out-alt"></i>
            Logout
        </a>

    </div>

    <!-- Main Content -->

    <div class="main-content">

        <div class="form-box">

            <h2>
                Submit Complaint
            </h2>

            <form onsubmit="submitComplaint(event)">

                <!-- Complaint Title -->

                <div class="mb-3">

                    <label>
                        Complaint Title
                    </label>

                    <input type="text"
                        class="form-control"
                        placeholder="Enter Complaint Title"
                        required>

                </div>

                <!-- Complaint Type -->

                <div class="mb-3">

                    <label>
                        Complaint Type
                    </label>

                    <select class="form-control"
                        id="complaintType"
                        onchange="showOtherField()"
                        required>

                        <option value="">
                            Select Complaint
                        </option>

                        <option>
                            Water Issue
                        </option>

                        <option>
                            Electricity Problem
                        </option>

                        <option>
                            Security Issue
                        </option>

                        <option>
                            Garbage Problem
                        </option>

                        <option>
                            Parking Issue
                        </option>

                        <option>
                            Noise Complaint
                        </option>

                        <option>
                            Lift Problem
                        </option>

                        <option>
                            Cleaning Issue
                        </option>

                        <option>
                            Internet Issue
                        </option>

                        <option>
                            Other
                        </option>

                    </select>

                </div>

                <!-- Other Field -->

                <div class="mb-3"
                    id="otherField"
                    style="display:none;">

                    <label>
                        Write Your Issue
                    </label>

                    <input type="text"
                        class="form-control"
                        placeholder="Write issue clearly">

                </div>

                <!-- Description -->

                <div class="mb-3">

                    <label>
                        Description
                    </label>

                    <textarea class="form-control"
                        rows="5"
                        placeholder="Explain your issue clearly"
                        required>
                    </textarea>

                </div>

                <!-- Submit Button -->

                <button class="btn-submit">

                    Submit Complaint

                </button>

            </form>

        </div>

    </div>

    <script>

        function showOtherField(){

            let complaint =
                document.getElementById("complaintType").value;

            let otherField =
                document.getElementById("otherField");

            if(complaint === "Other"){

                otherField.style.display = "block";

            }

            else{

                otherField.style.display = "none";

            }
        }

        function submitComplaint(event){

            event.preventDefault();

            alert(
                "Complaint Submitted Successfully!"
            );

            window.location.href =
                "complaints.html";
        }

    </script>

</body>

</html>
